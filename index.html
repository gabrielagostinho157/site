<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página de Páscoa</title>
    <style>
        body {
            background-color: #fff4e6;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            border: 4px dashed #ffcc80;
        }
        h1 { color: #d84315; font-size: 2.5rem; }
        .ovos { font-size: 50px; margin: 15px 0; }
        .mensagem { color: #5d4037; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="card">
        <div class="ovos">🐰🥚✨</div>
        <h1>Feliz Páscoa!</h1>
        <p class="mensagem">Desejo a você um dia doce e cheio de alegria.</p>
        <div class="ovos">🍫🎁</div>
    </div>

</body>
</html>
